            25%{background:linear-gradient(135deg,#2d1b3d,#3d1b3d,#3d1b3d,#2d1b3d)}
            50%{background:linear-gradient(135deg,#1a2e2e,#1b3d3d,#1b3d3d,#1a2e2e)}

        .toast.golden{background:linear-gradient(135deg,#ffde59,#ffa500);box-shadow:0 10px 40px rgba(255,165,0,0.5);}

        .combo-display{position:fixed;top:50%;right:30px;transform:translateY(-50%);text-align:center;z-index:5;pointer-events:none;opacity:0;transition:all 0.4s ease;}
        .combo-display.active{opacity:1;}

        .screen-flash.active{opacity:1;}

        /* Secret overlay */
        .secret-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity 0.5s;}
        .secret-overlay.show{opacity:1;pointer-events:all;}
        .secret-box{text-align:center;color:#ffb6d3;font-size:2rem;animation:secretPop 0.5s ease;}
        @keyframes secretPop{0%{transform:scale(0)rotate(180deg)}100%{transform:scale(1)rotate(0deg)}}

        /* Confetti */
        .confetti{position:fixed;pointer-events:none;z-index:150;animation:confettiFall linear forwards;}
        @keyframes confettiFall{0%{transform:translateY(-100px)rotate(0deg);opacity:1}100%{transform:translateY(110vh)rotate(720deg);opacity:0}}

        @media(max-width:480px){

        }
    </style>
</head>

    if(!totalImagesViewed[index]){totalImagesViewed[index]=0;}
    totalImagesViewed[index]++;

}

}

/* ===== AUDIO ===== */
function initAudio(){
    if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
    if(audioCtx.state==="suspended"){audioCtx.resume();}
}

function playCrySound(){
    initAudio();
    var audio=document.getElementById("cryAudio");
    if(audio){
        audio.currentTime=0;

    if(!audioCtx)initAudio();if(!audioCtx)return;

    var o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type="sine";o.frequency.setValueAtTime(600+Math.random()*400,now);

    g.gain.setValueAtTime(0.12,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.1);
    o.connect(g);g.connect(audioCtx.destination);o.start(now);o.stop(now+0.12);
}

function playAchievementSound(){
    if(!audioCtx)initAudio();if(!audioCtx)return;

    });
}

/* ===== MAIN CLICK ===== */
function handleClick(e){
    initAudio();totalClicks++;currentCombo++;

    var rect=characterDisplay.getBoundingClientRect();
    var x=e.clientX-rect.left,y=e.clientY-rect.top;
    var isCry=Math.random()<0.35 || currentCombo%10===0;

    if(isCry){
        totalCries++;cryIntensity=Math.min(10,cryIntensity+1);
        playCrySound();
        characterDisplay.classList.add("crying");
        showSpeech(getRandomMessage(cryMessages),2000);
        createTear(x-25,y-40);createTear(x+25,y-40);
        setTimeout(function(){createTear(x-20,y-35);createTear(x+20,y-35);},300);
        createFloatEmoji(x-10,y-30);createFloatEmoji(x+10,y-20);
        flashScreen();
        setTimeout(function(){characterDisplay.classList.remove("crying");},600);
    }else{
        playPopSound();
        characterDisplay.classList.add("poked");
        showSpeech(getRandomMessage(messages),1500);
        createFloatEmoji(x,y-20);
        setTimeout(function(){characterDisplay.classList.remove("poked");},500);
    }

    createRipple(x,y);
    updateCryMeter();
    updateCombo();
    updateStats();
    checkAchievements();

    // Combo milestones
    if(currentCombo===10){showSpeech("😱 10連打！！",2000);}
    if(currentCombo===30){showToast("⚡ 30連擊！閃電愛音！");flashScreen();spawnConfetti();randomImage();}
    if(currentCombo===50){showToast("🔥 50連擊！愛音要爆炸了！");flashScreen();spawnConfetti();randomImage();}
    if(currentCombo===100){showToast("💥💥 100連擊！！傳說級！！");flashScreen();flashScreen();spawnConfetti();spawnConfetti();randomImage();triggerSecret("HELP");}

    // Random image switch on high combo
    if(currentCombo>0 && currentCombo%15===0){randomImage();}

    // Rage mode
    if(isRageMode && Math.random()<0.5){showSpeech(getRandomMessage(rageMessages),1200);}
}

/* ===== KEYBOARD EASTER EGGS ===== */
var keyBuffer="";
var keyTimer=null;
document.addEventListener("keydown",function(e){
    // Space/Enter = click
    if(e.code==="Space"||e.code==="Enter"){
        e.preventDefault();
        var rect=characterDisplay.getBoundingClientRect();
        handleClick({clientX:rect.left+rect.width/2,clientY:rect.top+rect.height/2});
        return;
    }
    // Arrow keys = switch image
    if(e.code==="ArrowLeft"){e.preventDefault();switchImage((currentImgIndex-1+images.length)%images.length);return;}
    if(e.code==="ArrowRight"){e.preventDefault();switchImage((currentImgIndex+1)%images.length);return;}
    if(e.code==="ArrowUp"||e.code==="ArrowDown"){e.preventDefault();randomImage();return;}

    // Collect letters for secret codes
    if(e.key.length===1 && e.key.match(/[a-zA-Z]/)){
        keyBuffer+=e.key.toUpperCase();
        clearTimeout(keyTimer);
        keyTimer=setTimeout(function(){keyBuffer="";},2000);
        // Check known codes
        var codes=["ANON","MYGO","CRY","LOVE","HELP","NANO","TOKYO","RAINBOW","RAGE"];
        for(var i=0;i<codes.length;i++){
            if(keyBuffer.indexOf(codes[i])>=0){
                triggerSecret(codes[i]);
                keyBuffer="";break;
            }
        }
    }
    // Number keys for direct image selection
    if(e.key>="1" && e.key<="5"){
        var idx=parseInt(e.key)-1;
        if(idx<images.length){switchImage(idx);}
    }
});
